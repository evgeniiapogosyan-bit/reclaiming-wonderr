<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reclaiming Wonder - An immersive digital gallery experience featuring elegant animations.">
    <title>reclaiming wonder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <main class="scroll-container">
        <!-- Hero Section -->
        <section id="hero" class="section hero-section">
            <div class="hero-content">
                <h1 class="hero-title">reclaiming wonder</h1>
                <p class="hero-subtitle">scroll to explore</p>
                <div class="scroll-indicator">
                    <span class="indicator-line"></span>
                </div>
            </div>
        </section>

        <!-- Hanging Gallery Section -->
        <section id="gallery" class="section gallery-section">
            <div class="gallery-header">
                <span class="gallery-tag font-accent">curated artifacts</span>
                <h2 class="gallery-title">The Hanging Gallery</h2>
            </div>
            <div class="gallery-container">
                <div class="hanging-item" id="item-1">
                    <div class="string"></div>
                    <div class="image-card">
                        <img src="Nesproject/1.jpg" alt="Curated Wonder Piece 1" loading="lazy">
                        <div class="card-caption">
                            <span class="caption-num">01</span>
                            <span class="caption-text">silent threshold</span>
                        </div>
                    </div>
                </div>
